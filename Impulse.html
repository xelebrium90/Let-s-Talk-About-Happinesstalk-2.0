<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Animation</title>
    <style>
        .timer-numbers {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <svg id="timer" width="200" height="200" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" stroke="blue" stroke-width="5" fill="none" />
    </svg>

    <div class="timer-numbers" id="seconds">00</div>

    <script>
        let remainingTime = 60; // seconds
        const timerCircle = document.querySelector('#timer circle');
        const secondsDisplay = document.getElementById('seconds');
        const totalLength = 2 * Math.PI * 45;
        timerCircle.setAttribute('stroke-dasharray', totalLength);
        let strokeDashoffset = totalLength;

        function updateTimer() {
            const startTime = performance.now();
            const interval = setInterval(() => {
                const currentTime = Math.min((performance.now() - startTime) / 1000, remainingTime);
                strokeDashoffset = totalLength - (currentTime / remainingTime) * totalLength;
                timerCircle.setAttribute('stroke-dashoffset', strokeDashoffset);
                secondsDisplay.textContent = Math.floor(remainingTime - currentTime);
                if (currentTime >= remainingTime) {
                    clearInterval(interval);
                }
            }, 50);
        }

        requestAnimationFrame(function animation() {
            if (remainingTime > 0) {
                requestAnimationFrame(animation);
            }
        });

        updateTimer();
    </script>
</body>
</html>
