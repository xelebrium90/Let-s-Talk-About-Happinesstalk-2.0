<style>
    .impulse-question {
        font-style: italic;
        color: gray;
        margin-top: 5px;
    }
</style>

<script>
    const impulses = [
        {
            type: 'impulse',
            description: 'Impulse description here.',
            question: 'Was denkst du über diesen Impuls?', // corrected question
            category: 1
        },
        // ... other impulses with maximum German corrections according to categories
    ];

    function addCard(item) {
        const card = document.createElement('div');
        card.innerHTML = `<h3>${item.description}</h3>`; // render impulse text

        // question rendering based on category
        const questionElement = document.createElement('div');
        questionElement.className = 'impulse-question';
        questionElement.innerText = `${item.category}. ${item.question}`; // numbered question
        card.appendChild(questionElement);

        document.body.appendChild(card);
    }
</script>
